<!DOCTYPE html>

<html class="dark" lang="en"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>Aura Sentinel - Live Sentinel</title><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/><script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script><script id="tailwind-config">tailwind.config = { darkMode: "class", theme: { extend: { colors: { "apple-blue": "#007AFF", "apple-red": "#FF3B30", "primary": "#007AFF", "background-light": "#f6f7f8", "background-dark": "#101b22", "glass-surface": "rgba(255, 255, 255, 0.4)", "glass-border": "rgba(255, 255, 255, 0.2)", "neon-cyan": "#007AFF", "neon-amber": "#FFD60A", "neon-red": "#FF3B30", "neon-green": "#30D158", }, fontFamily: { "display": ["SF Pro Display", "-apple-system", "BlinkMacSystemFont", "Manrope", "sans-serif"], "mono": ["SF Mono", "ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "monospace"], }, boxShadow: { "glow-cyan": "0 0 15px rgba(0, 122, 255, 0.4), inset 0 0 10px rgba(0, 122, 255, 0.2)", "glow-amber": "0 0 20px rgba(255, 214, 10, 0.5), inset 0 0 10px rgba(255, 214, 10, 0.2)", "panic-glow": "0 0 12px rgba(255, 59, 48, 0.4)", "ios-shadow": "0 8px 32px 0 rgba(0, 0, 0, 0.3)" }, animation: { "scan": "scan 3s linear infinite", "pulse-slow": "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite", }, keyframes: { scan: { "0%": { top: "-10%" }, "100%": { top: "110%" }, } }, backdropBlur: { "glass": "20px", } }, }, }</script><style>.glass-panel { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); } .liquid-glass { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px) saturate(200%); -webkit-backdrop-filter: blur(20px) saturate(200%); border: 1px solid rgba(255, 255, 255, 0.2); } .sahi-grid { background-size: 32px 32px; background-image: linear-gradient(to right, rgba(0, 122, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(0, 122, 255, 0.03) 1px, transparent 1px); } .panic-core-glow { background: radial-gradient(circle, #FF3B30 0%, rgba(255, 59, 48, 0) 70%); animation: core-pulse 2s ease-in-out infinite; } @keyframes core-pulse { 0%, 100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 0.8; transform: scale(1.2); } } ::-webkit-scrollbar { display: none; }</style></head>
<body class="bg-black text-white h-screen w-full overflow-hidden font-display selection:bg-neon-cyan/30">
<!-- Main Container representing the Mobile Screen -->
<div class="relative h-full w-full max-w-md mx-auto bg-black overflow-hidden flex flex-col justify-between">
<!-- 1. Video Backdrop (Simulated) -->
<div class="absolute inset-0 z-0">
<img alt="Dark misty urban alleyway at night in Vietnam with dim street lights" class="w-full h-full object-cover object-center opacity-80" data-alt="Dark misty urban alleyway at night in Vietnam with dim street lights" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUqdNM-OpAdJg5tgZ6nCBXH3GK-7ZH71jdeQfB0Rbu4YwavZMQq_AG9BPO8hCcPxA0UNBpLAteb6qyxruJb9vCBZRZ-d3ZxQjIBhdQUSbyZD2Thg96lIzenhGzcBW_oJ4rBqhW0wJcoQK-Rv_AjK5mxnGV0GzAU-Q1zXHwLsI7NZIw2i1bTnK772AHeTV1ZprdYDtYuYjLisvVOk_WhSmK-BRnvf1StYI5yY_vU8bbj7LLe0lzJg-zqX0z_aloYCWWjRCcZvyrxsU"/>
<!-- Vignette overlay for better UI contrast at edges -->
<div class="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-black/90 pointer-events-none"></div>
</div>
<!-- 2. SAHI Grid & Scanning Animation -->
<div class="absolute inset-0 z-10 pointer-events-none">

<div class="absolute inset-0 sahi-grid opacity-30"></div>
<!-- Moving Scan Line -->
<div class="absolute w-full h-32 animate-scan z-10 scan-line pointer-events-none"></div>
</div>
<!-- 3. AI Bounding Boxes (Simulated detections) -->
<div class="absolute inset-0 z-20 pointer-events-none">
<!-- Detection 1: Nominal (Motorbike) -->
<div class="absolute top-[45%] left-[15%] w-[120px] h-[140px]">
<!-- Label Tag -->
<div class="absolute -top-7 left-0 flex items-center space-x-1.5 glass-panel px-2.5 py-1 rounded-lg border-white/20">
<div class="w-1.5 h-1.5 rounded-full bg-apple-blue shadow-[0_0_8px_rgba(0,122,255,0.6)]"></div>
<span class="text-[9px] font-bold text-white uppercase tracking-[0.1em]">Vehicle</span>
<span class="text-[9px] font-medium text-white/50">45°C</span>
</div>
<!-- Box -->
<div class="w-full h-full border-[1px] border-apple-blue/30 rounded-xl bg-apple-blue/5">
<!-- Corner Accents -->
<div class="absolute top-0 left-0 w-2 h-2 border-t-2 border-l-2 border-neon-cyan"></div>
<div class="absolute top-0 right-0 w-2 h-2 border-t-2 border-r-2 border-neon-cyan"></div>
<div class="absolute bottom-0 left-0 w-2 h-2 border-b-2 border-l-2 border-neon-cyan"></div>
<div class="absolute bottom-0 right-0 w-2 h-2 border-b-2 border-r-2 border-neon-cyan"></div>
</div>
</div>
<!-- Detection 2: Warning (Pot/Stall) -->
<div class="absolute top-[55%] right-[10%] w-[100px] h-[90px]">
<!-- Label Tag -->
<div class="absolute -top-12 right-0 flex flex-col items-end glass-panel px-3 py-2 rounded-xl border-white/20"><div class="flex items-center space-x-1.5 mb-0.5">
<span class="material-symbols-outlined text-apple-red text-[16px]" style="font-variation-settings: 'FILL' 1, 'wght' 400;">warning</span>
<span class="text-[10px] font-bold text-white uppercase tracking-wider">Heat Source</span>
</div>
<span class="text-[9px] font-medium text-apple-red/90 tracking-tight">88.4°C <span class="text-white/30 mx-1 font-light">|</span> 68% RH</span></div>
<!-- Box -->
<div class="w-full h-full border-[1px] border-apple-red/50 rounded-xl bg-apple-red/10 animate-pulse">
<!-- Corner Accents -->
<div class="absolute top-0 left-0 w-3 h-3 border-t-2 border-l-2 border-neon-amber"></div>
<div class="absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-neon-amber"></div>
<div class="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-neon-amber"></div>
<div class="absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-neon-amber"></div>
</div>
</div>
</div>
<!-- 4. Top UI: Status Pill -->
<div class="relative z-30 pt-6 px-4 flex justify-center w-full">
<div class="glass-panel h-[34px] px-5 rounded-full flex items-center space-x-3 transition-all duration-300 active:scale-95 cursor-pointer">
<div class="relative flex h-1.5 w-1.5">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#32D74B] opacity-40"></span>
<span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-[#32D74B]"></span>
</div>
<div class="flex items-center space-x-2"><span class="text-[11px] font-bold text-white/95 tracking-[0.05em] uppercase">System Active</span>
<span class="text-[10px] font-medium text-white/40 tracking-tight">Alley 4B</span></div>
</div>
</div>
<!-- 5. Bottom UI: Control Dock -->
<div class="relative z-30 flex flex-col w-full">
<!-- Floating Panic Button above Tab Bar -->
<div class="px-6 mb-4 flex justify-end">
<button class="flex flex-col items-center justify-center group relative">
<div class="relative flex items-center justify-center h-14 w-14 mb-1">
<div class="absolute inset-0 panic-core-glow rounded-full"></div>
<div class="absolute inset-0 bg-white/10 backdrop-blur-xl border border-white/20 rounded-full shadow-2xl"></div>
<span class="material-symbols-outlined text-apple-red text-[32px] relative z-10" style="font-variation-settings: 'FILL' 1, 'wght' 400;">emergency</span>
</div>
<span class="text-[10px] text-apple-red font-bold tracking-[0.2em] uppercase">Panic</span>
</button>
</div>
<!-- Standardized Tab Bar -->
<div class="liquid-glass mx-4 mb-8 px-6 py-3 rounded-[2rem] flex justify-between items-center shadow-ios-shadow">
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined text-[24px]">group</span>
<span class="text-[10px] font-bold uppercase tracking-wider">People</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined text-[24px]">devices</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Devices</span>
</a>
<a class="flex flex-col items-center gap-1 text-apple-blue" href="#" style="color: #007AFF;">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">visibility</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Sentinel</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined text-[24px]">map</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Alleyways</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined text-[24px]">account_circle</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Me</span>
</a>
</div>
</div>
</div>
