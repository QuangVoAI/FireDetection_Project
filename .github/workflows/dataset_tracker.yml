name: MLOps Multi-Dataset Progress Tracker

on:
  schedule:
    - cron: '0 17 * * *' # Chạy tự động lúc 00:00 hằng ngày (17:00 UTC)
  workflow_dispatch:      # Nút bấm thủ công

jobs:
  track_metrics:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests roboflow

      - name: Fetch and Report Dashboard
        env:
          ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
          ROBOFLOW_WORKSPACE: "springwangs-workspace"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/roboflow_metrics_tracker.py

      - name: 📦 Thu gom các Cục ZIP Dataset (nếu có bản v mới MLOps vừa đúc ra)
        uses: actions/upload-artifact@v4
        with:
          name: Auto-MLOps-Dataset-Backups
          path: "*.zip"
          retention-days: 90
